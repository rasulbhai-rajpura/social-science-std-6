<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>સામાજિક વિજ્ઞાન ક્વિઝ - રસુલભાઈ રાજપુરા</title>
    <style>
        /* ઓટો-એડજસ્ટ અને રિસ્પોન્સિવ ડિઝાઇન */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Noto Sans Gujarati', sans-serif; 
            font-weight: 700;
        }
        
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298, #6a1b9a); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
            overflow-x: hidden;
        }

        .container { 
            background: #f0f8ff; 
            border-radius: clamp(15px, 3vw, 30px); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); 
            padding: clamp(15px, 4vw, 40px); 
            max-width: 1100px; 
            width: 98%; 
            border: 3px solid rgba(255, 255, 255, 0.7);
            position: relative;
            max-height: 96vh;
            overflow-y: auto;
        }
        
        .school-header { 
            background: white; 
            padding: clamp(10px, 2vw, 20px); 
            border-radius: 15px; 
            text-align: center; 
            margin-bottom: clamp(15px, 3vw, 25px); 
            border-bottom: 8px solid #2E7D32;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .school-name { font-size: clamp(18px, 4vw, 32px); color: #b21f1f; }
        .teacher-info { font-size: clamp(14px, 2.5vw, 22px); color: #1a2a6c; margin-top: 5px; display: block; }
        
        .lesson-title { 
            text-align: center; color: #ff5722; margin-bottom: 20px; 
            font-size: clamp(22px, 5vw, 42px); 
            text-shadow: 2px 2px 0px #fff;
        }

        .student-form, .quiz-container, .result-container { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input { 
            width: 100%; padding: clamp(12px, 2vw, 20px); border: 3px solid #cbd5e0; 
            border-radius: 15px; font-size: clamp(16px, 2vw, 22px); outline: none; 
            color: #1a2a6c; background: #fff; margin-bottom: 15px;
        }
        
        .start-btn { 
            width: 100%; padding: clamp(15px, 3vw, 25px); 
            background: linear-gradient(45deg, #4CAF50, #2E7D32); 
            color: white; border: none; border-radius: 18px; 
            font-size: clamp(18px, 3vw, 28px); cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
            text-transform: uppercase;
        }
        .start-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .quiz-header { 
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: clamp(10px, 2vw, 15px); border-radius: 12px; 
            color: #1a2a6c; border: 2px solid #e2e8f0; margin-bottom: 15px;
            font-size: clamp(14px, 2vw, 22px);
        }
        
        .progress { background: #d1e3f8; height: clamp(10px, 1.5vw, 15px); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #2196F3, #00BCD4); width: 0%; transition: 0.6s; }

        .question-container { 
            background: #fff; padding: clamp(15px, 4vw, 40px); border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px;
            border-left: clamp(8px, 1.2vw, 15px) solid #6a1b9a;
        }
        .question { font-size: clamp(20px, 3.5vw, 34px); color: #1a202c; margin-bottom: 20px; line-height: 1.4; }
        
        .options { display: grid; gap: clamp(10px, 2vw, 20px); grid-template-columns: 1fr; }
        @media (min-width: 768px) { .options { grid-template-columns: 1fr 1fr; } }

        .option { 
            padding: clamp(12px, 2.5vw, 22px); background: #fff; border: 3px solid #edf2f7; 
            border-radius: 15px; cursor: pointer; transition: 0.2s; 
            font-size: clamp(16px, 2.2vw, 24px); color: #2d3748;
            display: flex; align-items: center;
        }
        .option:hover { background: #eef2f7; border-color: #2196F3; }
        .option-label { color: #2196F3; margin-right: 15px; font-size: 1.2em; }

        .option.correct { background: #00AD00 !important; border-color: #008A00 !important; color: white !important; }
        .option.wrong { background: #FF0000 !important; border-color: #CC0000 !important; color: white !important; }
        
        .timer-text { text-align: center; font-size: clamp(30px, 5vw, 55px); color: #ff5722; margin-bottom: 10px; }
        .leaderboard-table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: clamp(14px, 2vw, 22px); }
        .disabled { pointer-events: none; }
    </style>
</head>
<body>
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div class="container">
        <div class="school-header">
            <div class="school-name">🏫 શ્રી પાનસડા અનુપમ પ્રાથમિક શાળા</div>
            <div class="teacher-info">👨‍🏫 માર્ગદર્શક: રસુલભાઈ રાજપુરા</div>
            <div class="creator-info">🎮 Game Created by: Rasulbhai Rajpura</div>
        </div>

        <div class="student-form active" id="studentForm">
            <h1 class="lesson-title">પાઠ ૧: ચાલો ઇતિહાસ જાણીએ</h1> 
            <input type="text" id="studentName" placeholder="👤 વિદ્યાર્થીનું પૂરું નામ" required>
            <input type="text" id="studentRoll" placeholder="🆔 રોલ નંબર" required>
            <input type="text" id="studentClass" placeholder="📚 તમારું ધોરણ લખો" required>
            <button class="start-btn" onclick="startQuiz()">ચાલો શરૂ કરીએ! 🚀</button>
        </div>

        <div class="quiz-container" id="quizContainer">
            <div class="quiz-header">
                <div id="qCount">પ્રશ્ન: 0/0</div>
                <div id="levelDisplay">Easy</div>
                <div id="scoreDisplay">સ્કોર: 0</div>
            </div>
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div class="timer-text">⏱️ <span id="timerText">20</span></div>
            <div class="question-container">
                <div class="question" id="question"></div>
                <div id="options" class="options"></div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <h1 style="color: #2196F3; text-align:center;">🏆 સ્કોર કાર્ડ</h1>
            <div style="text-align: center; margin: 20px 0; background: #fff; padding: clamp(15px, 3vw, 30px); border-radius: 20px; border: 3px dashed #4299e1;">
                સ્કોર: <span id="finalScore" style="font-size: clamp(35px, 6vw, 50px); color: #b21f1f;"></span><br>
                <span id="resultStatus" style="font-size: clamp(25px, 4vw, 35px);"></span>
            </div>
            <div id="resultDetails" style="background: #fff; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; line-height: 1.8; color: #1a2a6c; font-size: clamp(16px, 2.5vw, 22px);"></div>
            <h3 style="margin-top: 25px; color: #1a202c; border-bottom: 5px solid #2E7D32; padding-bottom: 5px;">📊 ટોપ 5 લીડરબોર્ડ</h3>
            <table class="leaderboard-table"><tbody id="leaderboardBody"></tbody></table>
            <button class="start-btn" onclick="location.reload()" style="background:#1e3c72; margin-top:20px;">🔄 ફરીથી રમો</button>
        </div>
    </div>

    <script>
        // --- અપગ્રેડેડ સાઉન્ડ ફંક્શન ---
        function playSound(type) {
            const correctSound = document.getElementById('sound-correct');
            const wrongSound = document.getElementById('sound-wrong');
            
            if (type === 'correct') {
                correctSound.currentTime = 0;
                correctSound.play().catch(e => console.log("Audio play failed"));
            } else {
                wrongSound.currentTime = 0;
                wrongSound.play().catch(e => console.log("Audio play failed"));
            }
        }

        const questionsData = {
            easy: [
                { q: "પ્રાચીન સમયમાં માનવી લખવા માટે કયા વૃક્ષની છાલનો ઉપયોગ કરતો હતો?", opts: ["વડ", "ભૂર્જ", "પીપળો", "આંબો"], ans: "ભૂર્જ" },
                { q: "શિલાઓ અને પથ્થરો પર કોતરાયેલા લેખોને શું કહેવામાં આવે છે?", opts: ["અભિલેખો", "ભોજપત્રો", "તાડપત્રો", "દસ્તાવેજ"], ans: "અભિલેખો" },
                { q: "ભારતમાં મળી આવેલા સૌથી જૂના સિક્કા કયા છે?", opts: ["સોનાના સિક્કા", "રૂપિયો", "પંચમાર્ક સિક્કા", "મોહર"], ans: "પંચમાર્ક સિક્કા" },
                { q: "તાડપત્રો એટલે કયા વૃક્ષના પર્ણ પર લખાયેલી હસ્તપ્રતો?", opts: ["નાળિયેરી", "ખજૂરી", "તાડ", "સીતાફળ"], ans: "તાડ" },
                { q: "ઇતિહાસ જાણવાના સ્ત્રોતોમાં નીચેનામાંથી કોનો સમાવેશ થતો નથી?", opts: ["અભિલેખો", "તાંમ્રપત્રો", "નવા વાહનો", "જૂના સિક્કા"], ans: "નવા વાહનો" },
                { q: "તાંબાના પતરા ઉપર કોતરીને લખવામાં આવતા લખાણને શું કહેવાય?", opts: ["ભોજપત્ર", "તાંમ્રપત્ર", "શિલાલેખ", "ખતપત્ર"], ans: "તાંમ્રપત્ર" },
                { q: "ગુજરાતમાં શ્રી હેમચંદ્રાચાર્ય જૈન જ્ઞાનભંડાર કયા શહેરમાં આવેલું છે?", opts: ["અમદાવાદ", "પાટણ", "વડોદરા", "ગાંધીનગર"], ans: "પાટણ" },
                { q: "ઇતિહાસકારોના મતે 'India' શબ્દ કયા શબ્દ પરથી ઉતરી આવ્યો છે?", opts: ["Indus", "Indu", "Bharat", "Hindustan"], ans: "Indus" },
                { q: "ઈસુ ખ્રિસ્તના જન્મ પછીના વર્ષોને કઈ રીતે ઓળખવામાં આવે છે?", opts: ["B.C.", "A.D.", "B.C.E.", "Year"], ans: "A.D." },
                { q: "કચ્છમાં કયા સ્થળેથી હડપ્પીય સંસ્કૃતિના અવશેષો મળી આવ્યા છે?", opts: ["લોથલ", "રંગપુર", "ધોળાવીરા", "રોઝડી"], ans: "ધોળાવીરા" }
            ],
            medium: [
                { q: "પ્રાચીન સમયમાં ઈરાનીઓ સિંધુ નદીના કયા કિનારાને 'ઇન્ડિયા' તરીકે ઓળખાવતા હતા?", opts: ["પશ્ચિમ કિનારાને", "દક્ષિણ કિનારાને", "પૂર્વ કિનારાને", "ઉત્તર કિનારાને"], ans: "પૂર્વ કિનારાને" },
                { q: "ભારત નામનો માનવસમૂહ ઉત્તર-પશ્ચિમ ભારતમાં આવીને વસ્યો હતો, તેનો ઉલ્લેખ કયા વેદમાં છે?", opts: ["ઋગ્વેદ", "સામવેદ", "યજુર્વેદ", "અથર્વવેદ"], ans: "ઋગ્વેદ" },
                { q: "અભિલેખાગારમાં નીચેનામાંથી કઈ વસ્તુ સાચવવામાં આવે છે?", opts: ["જૂના સિક્કા", "હસ્તપ્રતો અને દસ્તાવેજો", "ખેતીના ઓજારો", "આધુમિક રમકડાં"], ans: "હસ્તપ્રતો અને દસ્તાવેજો" },
                { q: "સી.ઈ. (C.E.) ને બીજા કયા ટૂંકા નામે પણ ઓળખવામાં આવે છે?", opts: ["B.C.", "B.C.E.", "A.D.", "A.C."], ans: "A.D." },
                { q: "ભૂર્જ નામના વિશિષ્ટ વૃક્ષો કયા પર્વતીય વિસ્તારમાં જોવા મળે છે?", opts: ["હિમાલય", "ગિરનાર", "સાપુતારા", "પાવાગઢ"], ans: "હિમાલય" },
                { q: "કયા શાસકના શિલાલેખો ઇતિહાસ જાણવા માટે ખૂબ જ જાણીતા છે?", opts: ["ચંદ્રગુપ્ત મૌર્ય", "સમ્રાટ હર્ષવર્ધન", "સમ્રાટ અશોક", "મહારાણા પ્રતાપ"], ans: "સમ્રાટ અશોક" },
                { q: "પ્રાચીન સિક્કાઓના અભ્યાસ પરથી આપણને કઈ માહિતી મળી શકે છે?", opts: ["માત્ર રાજાનું નામ", "માત્ર ધર્મની વિગત", "રાજા, ધર્મ અને સંસ્કૃતિ", "માત્ર લિપિની ઓળખ"], ans: "રાજા, ધર્મ અને સંસ્કૃતિ" },
                { q: "ગ્રીસના લોકો સિંધુ નદીને કયા નામે ઓળખતા હતા?", opts: ["હિન્દોસ", "ઇન્ડિયા", "ભારત", "ઇન્ડસ"], ans: "ઇન્ડસ" },
                { q: "વડોદરામાં કઈ સંસ્થા આવેલી છે જે પ્રાચીન સ્ત્રોતો સાચવે છે?", opts: ["L.D. ઇન્સ્ટિટ્યૂટ", "ઓરિએન્ટલ ઇન્સ્ટિટ્યૂટ", "જ્ઞાનભંડાર", "સાહિત્ય સભા"], ans: "ઓરિએન્ટલ ઇન્સ્ટિટ્યૂટ" },
                { q: "ઇતિહાસ એટલે માનવ સમાજનો શું જાણવા માટેનું વિજ્ઞાન છે?", opts: ["ભવિષ્ય", "વર્તમાન", "અવકાશ", "ભૂતકાળ"], ans: "ભૂતકાળ" }
            ],
            hard: [
                { q: "ઈરાનીઓ અને ગ્રીસના લોકો સિંધુ નદીથી પરિચિત હતા, તેઓ કેટલા વર્ષ પહેલાં આ પ્રદેશના સંપર્કમાં આવ્યા હતા?", opts: ["૨૦૦૦ વર્ષ પહેલાં", "૨૫૦૦ વર્ષ પહેલાં", "૩૦૦૦ વર્ષ પહેલાં", "૧૫૦૦ વર્ષ પહેલાં"], ans: "૨૫૦૦ વર્ષ પહેલાં" },
                { q: "પ્રાચીન સમયમાં ઈરાનીઓ સિંધુ નદીને શું કહેતા હતા?", opts: ["ઇન્ડસ", "હિન્દોસ", "ઇન્ડિયા", "ભારત"], ans: "હિન્દોસ" },
                { q: "બી.સી.ઈ. (B.C.E.) નું પૂરું નામ શું છે?", opts: ["Before Christ Era", "Before Century Era", "Before Common Era", "Before Current Era"], ans: "Before Common Era" },
                { q: "પ્રાચીન સમયમાં મળી આવતા પંચમાર્ક સિક્કા કઈ રીતે બનાવવામાં આવતા હતા?", opts: ["બીબામાં દબાવીને", "સોનાને ઓગાળીને", "હાથથી કોતરીને", "રંગો ચડાવીને"], ans: "બીબામાં દબાવીને" },
                { q: "નીચેનામાંથી કયા વિદેશી મુસાફરોએ ભારતની મુલાકાત લીધી હતી જેમના લખાણો ઇતિહાસના સ્ત્રોત છે?", opts: ["મેગેસ્થનીઝ અને પ્લિની", "ફાહિયાન અને હ્યુ-એન-ત્સાંગ", "ટોલેમી", "આપેલ તમામ"], ans: "આપેલ તમામ" },
                { q: "ઘણીવાર A.D. ને બદલે કયો શબ્દ વપરાય છે?", opts: ["B.C.E.", "B.C.", "C.E.", "A.C.E."], ans: "C.E." },
                { q: "સમ્રાટ અશોકના શિલાલેખો કઈ લિપિમાં લખાયેલા જોવા મળે છે?", opts: ["સંસ્કૃત", "બ્રાહ્મી", "હિન્દી", "ગુજરાતી"], ans: "બ્રાહ્મી" },
                { q: "પુરાતત્વશાસ્ત્રીઓને અંગ્રેજીમાં કયા નામે ઓળખવામાં આવે છે?", opts: ["આર્કિયોલોજિસ્ટ", "હિસ્ટોરિયન", "જીયોગ્રાફર", "એન્થ્રોપોલોજિસ્ટ"], ans: "આર્કિયોલોજિસ્ટ" },
                { q: "ઇતિહાસ જાણવા માટે તાંમ્રપત્રો પર રાજાઓ શું કોતરાવતા હતા?", opts: ["પોતાનું નામ અને વંશ", "વહીવટીતંત્ર અને દાનની વિગતો", "પોતાનો ધર્મ", "આપેલ તમામ"], ans: "આપેલ તમામ" },
                { q: "કચ્છના ભચાઉ તાલુકામાં કયું હડપ્પીય સંસ્કૃતિનું નગર ત્રણ ભાગમાં વહેંચાયેલું મળી આવ્યું છે?", opts: ["લોથલ", "ધોળાવીરા", "રંગપુર", "રોઝડી"], ans: "ધોળાવીરા" }
            ]
        };

        let currentIdx = 0, score = 0, timer = 20, timerInt, allQ = [], student = {};

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            student = { name: document.getElementById('studentName').value, roll: document.getElementById('studentRoll').value, class: document.getElementById('studentClass').value };
            if (!student.name || !student.roll || !student.class) return alert("⚠️ બધી વિગતો ભરો!");
            allQ = [...shuffle([...questionsData.easy]), ...shuffle([...questionsData.medium]), ...shuffle([...questionsData.hard])];
            document.getElementById('studentForm').classList.remove('active');
            document.getElementById('quizContainer').classList.add('active');
            loadQ();
        }

        function loadQ() {
            const q = allQ[currentIdx];
            const levelEl = document.getElementById('levelDisplay');
            let levelTxt = currentIdx < 10 ? "Easy (1 Pt)" : (currentIdx < 20 ? "Medium (3 Pts)" : "Hard (6 Pts)");
            levelEl.textContent = levelTxt;
            levelEl.style.color = currentIdx < 10 ? "#2E7D32" : (currentIdx < 20 ? "#2196F3" : "#b21f1f");

            document.getElementById('qCount').textContent = `પ્રશ્ન: ${currentIdx + 1}/${allQ.length}`;
            document.getElementById('question').textContent = q.q;
            const optBox = document.getElementById('options');
            optBox.innerHTML = ''; optBox.classList.remove('disabled');
            
            shuffle([...q.opts]).forEach((o, i) => {
                const b = document.createElement('div');
                b.className = 'option'; b.innerHTML = `<span class="option-label">${String.fromCharCode(65+i)}</span> ${o}`;
                b.onclick = () => check(o, b, q.ans);
                optBox.appendChild(b);
            });
            startTimer();
        }

        function check(sel, btn, ans) {
            clearInterval(timerInt);
            document.getElementById('options').classList.add('disabled');
            let pts = currentIdx < 10 ? 1 : (currentIdx < 20 ? 3 : 6);
            if (sel === ans) { score += pts; if(btn) btn.classList.add('correct'); playSound('correct'); } 
            else { if(btn) btn.classList.add('wrong'); playSound('wrong'); document.querySelectorAll('.option').forEach(ob => { if(ob.textContent.slice(3).trim() === ans.trim()) ob.classList.add('correct'); }); }
            document.getElementById('scoreDisplay').textContent = `સ્કોર: ${score}`;
            document.getElementById('progressBar').style.width = ((currentIdx + 1) / allQ.length) * 100 + '%';
            setTimeout(() => { currentIdx++; if (currentIdx < allQ.length) loadQ(); else showResult(); }, 2000);
        }

        function startTimer() {
            timer = 20; document.getElementById('timerText').textContent = timer;
            clearInterval(timerInt);
            timerInt = setInterval(() => { timer--; document.getElementById('timerText').textContent = timer; if (timer <= 0) { clearInterval(timerInt); check(null, null, allQ[currentIdx].ans); } }, 1000);
        }

        function showResult() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').classList.add('active');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('resultStatus').innerHTML = score >= (allQ.length * 0.5) ? "પાસ ✅" : "ફેલ ❌";
            document.getElementById('resultDetails').innerHTML = `નામ: ${student.name}<br>રોલ: ${student.roll}<br>ધોરણ: ${student.class}`;
            saveAndShowLeader();
        }

        function saveAndShowLeader() {
            let list = JSON.parse(localStorage.getItem('leaders')) || [];
            list.push({ n: student.name, s: score });
            list.sort((a, b) => b.s - a.s);
            localStorage.setItem('leaders', JSON.stringify(list.slice(0, 5)));
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = list.slice(0, 5).map((l, i) => {
                let medal = i===0 ? "🥇 Gold" : (i===1 ? "🥈 Silver" : (i===2 ? "🥉 Bronze" : `#${i+1}`));
                let clr = i===0 ? "#D4AF37" : (i===1 ? "#AAA9AD" : (i===2 ? "#CD7F32" : "#1a2a6c"));
                return `<tr style="border-bottom:2px solid #eee; height:clamp(40px, 8vw, 60px);"><td style="color:${clr}; font-weight:900;">${medal}</td><td style="font-weight:bold;">${l.n}</td><td style="text-align:right; color:#2196F3;">${l.s} Pts</td></tr>`;
            }).join('');
        }

        function clearLeaderboard() { if (confirm("ડેટા સાફ કરવો છે?")) { localStorage.removeItem('leaders'); location.reload(); } }
    </script>
</body>
