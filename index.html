<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>શ્રી પાનસડા અનુપમ પ્રાથમિક શાળા - ધોરણ 6 સામાજિક વિજ્ઞાન</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --main-bg: #FDF5E6;
            --card-bg: #FFF9E3;
            --header-bg: #E3F2FD;
            --quiz-gradient: linear-gradient(180deg, #fce4ec 0%, #d1c4e9 100%);
        }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--main-bg);
            display: flex; justify-content: center; align-items: center;
        }

        #ui-layer {
            position: absolute; width: 90%; max-width: 500px; 
            background: var(--card-bg);
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center; z-index: 100; box-sizing: border-box; 
            border: 2px solid #e6dbb9;
        }

        .school-name { color: #8b4513; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .teacher-name { color: #5d4037; font-size: 16px; margin-bottom: 20px; border-bottom: 1px solid #d7ccc8; padding-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: var(--primary); font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #ccc;
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; background: #fff;
        }

        .btn-main {
            width: 100%; padding: 15px; margin-top: 10px; border: none;
            border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .btn-start { background: var(--success); color: white; }
        .btn-admin { background: #6d4c41; color: white; margin-top: 15px; font-size: 14px; }
        .front-footer { margin-top: 20px; color: #5d4037; font-size: 14px; font-weight: bold; }

        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--quiz-gradient); display: none; flex-direction: column; 
            align-items: center; justify-content: flex-start; z-index: 150;
            overflow-y: auto; padding: 20px 0;
        }

        #quiz-card {
            width: 95%; max-width: 420px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: 10px 0;
        }

        .question-box { 
            font-size: 19px; font-weight: 800; color: #000; 
            margin-bottom: 20px; min-height: auto; text-align: left; line-height: 1.4;
        }

        .quiz-header { display: flex; justify-content: space-between; font-weight: bold; color: #4a148c; margin-bottom: 20px; }
        .opt-btn {
            width: 100%; background: white; border: none; padding: 18px;
            margin-bottom: 12px; border-radius: 15px; font-size: 18px;
            font-weight: bold; text-align: left; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .opt-btn.correct { background-color: var(--success) !important; color: white; }
        .opt-btn.wrong { background-color: var(--error) !important; color: white; }

        .dots-grid {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px;
            justify-content: center; padding: 15px; background: #f9f4ff;
            border-radius: 20px; max-height: 180px; overflow-y: auto; border: 1px solid #e1bee7;
        }

        .dot {
            width: 32px; height: 32px; border-radius: 50%; background: white;
            border: 1.5px solid #ddd; display: flex; align-items: center;
            justify-content: center; font-size: 13px; font-weight: bold; color: #7e57c2;
        }

        .dot.current { border: 2px solid #673ab7; transform: scale(1.1); }
        .dot.is-correct { background: var(--success) !important; color: white; border: none; }
        .dot.is-wrong { background: var(--error) !important; color: white; border: none; }

        .credit-footer { margin-top: 20px; font-size: 12px; color: #1565c0; text-align: center; font-weight: bold; }

        #admin-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--header-bg); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .admin-box { background: #fff; padding: 40px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="school-name">શ્રી પાનસડા અનુપમ પ્રાથમિક શાળા</div>
    <div class="teacher-name">માર્ગદર્શક: શિક્ષક શ્રી રસુલભાઈ રાજપુરા</div>
    
    <div class="input-group"><label>વિદ્યાર્થીનું નામ:</label><input type="text" id="studentName" placeholder="તમારું નામ"></div>
    <div class="input-group"><label>રોલ નંબર:</label><input type="number" id="rollNo" placeholder="રોલ નંબર"></div>
    <div class="input-group"><label>પાઠ પસંદ કરો:</label>
        <select id="chapter">
            <option value="all">તમામ પાઠ (11,12,13,16,17)</option>
            <option value="11">પાઠ 11: ભૂમિ સ્વરૂપો</option>
            <option value="12">પાઠ 12: નકશો સમજીએ</option>
            <option value="13">પાઠ 13: ભારત ભૂપૃષ્ઠ આબોહવા વનસ્પતિ અને વન્યજીવન</option>
            <option value="16">પાઠ 16: સ્થાનિક સરકાર</option>
            <option value="17">પાઠ 17: જીવન નિર્વાહ</option>
        </select>
    </div>
    <button class="btn-main btn-start" onclick="startGame()">રમત શરૂ કરો</button>
    <button class="btn-main btn-admin" onclick="showAdmin()">શિક્ષક લોગિન</button>
    <div class="front-footer">ગેમ ક્રિએટેડ બાય: રસુલભાઈ રાજપુરા</div>
</div>

<div id="quiz-overlay">
    <div id="quiz-card">
        <div class="quiz-header">
            <span id="q-info">પ્રશ્ન 1/50</span>
            <span>⏱ <span id="timer-val">20</span></span>
        </div>
        <div class="question-box" id="q-text">પ્રશ્ન લોડ થઈ રહ્યો છે...</div>
        <div id="options-container">
            <button class="opt-btn" onclick="handleSelect('a')" id="btn-a"></button>
            <button class="opt-btn" onclick="handleSelect('b')" id="btn-b"></button>
            <button class="opt-btn" onclick="handleSelect('c')" id="btn-c"></button>
            <button class="opt-btn" onclick="handleSelect('d')" id="btn-d"></button>
        </div>
        <div class="dots-grid" id="dots-area"></div>
        <div class="credit-footer">RASULBHAI RAJPURA, Shree Pansada Anupam Primary School</div>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-box">
        <h2>શિક્ષક એડમિન પેનલ</h2>
        <input type="password" id="adminPass" placeholder="એડમિન પાસવર્ડ નાખો">
        <div id="admin-actions" style="margin-top:20px; display:none;">
            <p id="record-count"></p>
            <button class="btn-main" style="background:#2ecc71; color:white;" onclick="downloadData()">Excel રિપોર્ટ ડાઉનલોડ</button>
            <button class="btn-main" style="background:#f39c12; color:white;" onclick="clearData()">ડેટા સાફ કરો</button>
        </div>
        <button class="btn-main" style="background:#e74c3c; color:white; margin-top:10px;" onclick="hideAdmin()">પાછા જાઓ</button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

const firebaseConfig = {
    apiKey: "અહીં_તમારો_API_KEY_નાખો",
    authDomain: "તમારો_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://તમારો_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "તમારો_PROJECT_ID",
    storageBucket: "તમારો_PROJECT_ID.appspot.com",
    messagingSenderId: "તમારો_MESSAGING_ID",
    appId: "તમારો_APP_ID"

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- ૨. તમારી પ્રશ્ન બેંક અહીંથી શરૂ થશે ---
// બાકીના 50 પ્રશ્નો અહીં મૂકવા...

const questionBank = [
     { ch: 11, q: "પૃથ્વીના પોપડાની અંદર થતા હલનચલન માટે મુખ્યત્વે કયા પરિબળો જવાબદાર છે?", a: "બાહ્ય બળો", b: "આંતરિક બળો", c: "વાતાવરણીય દબાણ", d: "સૂર્યપ્રકાશ", correct: "b" },
{ ch: 11, q: "સમુદ્ર સપાટીથી આશરે 900 મીટરથી વધુ ઊંચાઈ અને સાંકડા શિખરો ધરાવતા ભૂમિ સ્વરૂપને શું કહેવાય?", a: "ઉચ્ચપ્રદેશ", b: "પર્વત", c: "મેદાન", d: "દ્વીપકલ્પ", correct: "b" },
{ ch: 11, q: "વિશ્વના મોટાભાગના ગેડ પર્વતોનું નિર્માણ કઈ પ્રક્રિયા દ્વારા થયું છે?", a: "ઘસારણ", b: "જ્વાળામુખી વિસ્ફોટ", c: "સમુદ્ર તળના નિક્ષેપ પર દબાણ", d: "ભૂસ્તરીય ખેંચાણ", correct: "c" },
{ ch: 11, q: "નીચેનામાંથી કઈ પર્વતમાળા ગેડ પર્વતનું ઉદાહરણ નથી?", a: "હિમાલય", b: "આલ્પ્સ", c: "નીલગિરી", d: "રોકીઝ", correct: "c" },
{ ch: 11, q: "ખંડ પર્વતની રચના વખતે નીચે બેસી જતા મધ્ય ભાગને ભૌગોલિક પરિભાષામાં શું કહે છે?", a: "હોસ્ટ", b: "ફાટખીણ", c: "ગુંબજ", d: "મેદાન", correct: "b" },
{ ch: 11, q: "જર્મનીનો હોસ્ટ પર્વત કયા પ્રકારના પર્વતનું ઉત્તમ ઉદાહરણ પૂરું પાડે છે?", a: "ખંડ પર્વત", b: "ગેડ પર્વત", c: "જ્વાળામુખી પર્વત", d: "અવશિષ્ટ પર્વત", correct: "a" },
{ ch: 11, q: "જ્યારે પૃથ્વીના પેટાળમાંથી ગરમ લાવારસ ફેંકાય અને તે શંકુ આકારે જમા થાય ત્યારે કયો પર્વત બને છે?", a: "એન્ડીઝ", b: "ફુજિયામા", c: "અરવલ્લી", d: "સાતપુડા", correct: "b" },

{ ch: 11, q: "ઘસારાના બળો સામે ટકી રહેલા નક્કર ખડકોના શેષ ભાગમાંથી કયો પર્વત બને છે?", a: "અવશિષ્ટ પર્વત", b: "જ્વાળામુખી પર્વત", c: "ખંડ પર્વત", d: "ગેડ પર્વત", correct: "a" },
{ ch: 11, q: "ભારતનો અરવલ્લી પર્વત વિશ્વના કયા પ્રકારના સૌથી પ્રાચીન પર્વતોમાં સ્થાન ધરાવે છે?", a: "ખંડ", b: "જ્વાળામુખી", c: "અવશિષ્ટ", d: "ગેડ", correct: "c" },

{ ch: 11, q: "તિબેટનો ઉચ્ચપ્રદેશ કયા પ્રકારના ઉચ્ચપ્રદેશનું શ્રેષ્ઠ ઉદાહરણ પૂરું પાડે છે?", a: "ખંડીય", b: "આંતરપર્વતીય", c: "પર્વતપ્રાંતિય", d: "તટીય", correct: "b" },
{ ch: 11, q: "દક્ષિણ અમેરિકાનો પેટાગોનિયા ઉચ્ચપ્રદેશ કયા વર્ગમાં આવે છે?", a: "ખંડીય", b: "આંતરપર્વતીય", c: "પર્વતપ્રાંતિય", d: "જ્વાળામુખી", correct: "c" },
{ ch: 11, q: "પૃથ્વીના ભૂગર્ભિક હલનચલનથી જ્યારે મોટો ભૂમિભાગ એકાએક ઊંચકાય ત્યારે કયો ઉચ્ચપ્રદેશ બને છે?", a: "આંતરપર્વતીય", b: "પર્વતપ્રાંતિય", c: "ખંડીય", d: "ઘસારણ", correct: "c" },
{ ch: 11, q: "ભારતમાં લોખંડ, મેંગેનીઝ અને સોના જેવી કિંમતી ખનિજો મુખ્યત્વે કયા ઉચ્ચપ્રદેશમાંથી મળે છે?", a: "માળવાનો ઉચ્ચપ્રદેશ", b: "છોટાનાગપુરનો ઉચ્ચપ્રદેશ", c: "દખ્ખણનો ઉચ્ચપ્રદેશ", d: "સૌરાષ્ટ્રનો ઉચ્ચપ્રદેશ", correct: "b" },
{ ch: 11, q: "ઉચ્ચપ્રદેશની લાવાની કાળી જમીન કયા પાકની ખેતી માટે અત્યંત અનુકૂળ છે?", a: "ઘઉં", b: "ડાંગર", c: "કપાસ", d: "બાજરી", correct: "c" },
{ ch: 11, q: "સમુદ્ર સપાટીથી આશરે 180 મીટરથી ઓછી ઊંચાઈ ધરાવતા સમથલ ભૂમિભાગને શું કહેવાય?", a: "મેદાન", b: "ઉચ્ચપ્રદેશ", c: "ખીણ", d: "ટાપુ", correct: "a" },

let questions = [], currentIdx = 0, score = 0, timer = 30, timerId, studentData = {};

// --- ૩. તમારા બધા ઓરિજનલ ફંક્શન યથાવત છે ---
function startGame() {
    const name = document.getElementById('studentName').value;
    const roll = document.getElementById('rollNo').value;
    const ch = document.getElementById('chapter').value;
    if(!name || !roll) return alert("નામ અને રોલ નંબર લખો!");

    studentData = { name, roll, chapter: ch };
    questions = ch === "all" ? [...questionBank] : questionBank.filter(q => q.ch == ch);
    questions = questions.sort(() => Math.random() - 0.5).slice(0, 50);

    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('quiz-overlay').style.display = 'flex';
    
    initDots();
    renderQuestion();
}

function initDots() {
    const area = document.getElementById('dots-area');
    area.innerHTML = '';
    questions.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot';
        d.id = `dot-${i}`;
        d.innerText = i + 1;
        area.appendChild(d);
    });
}

function renderQuestion() {
    if(currentIdx >= questions.length) return endBatch();
    
    const q = questions[currentIdx];
    document.getElementById('q-info').innerText = `પ્રશ્ન ${currentIdx + 1}/${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    ['a','b','c','d'].forEach(l => {
        const btn = document.getElementById(`btn-${l}`);
        btn.innerText = q[l];
        btn.className = 'opt-btn';
        btn.disabled = false;
    });

    document.querySelectorAll('.dot').forEach(d => d.classList.remove('current'));
    document.getElementById(`dot-${currentIdx}`).classList.add('current');

    timer = 30;
    document.getElementById('timer-val').innerText = timer;
    clearInterval(timerId);
    timerId = setInterval(() => {
        timer--;
        document.getElementById('timer-val').innerText = timer;
        if(timer <= 0) handleSelect(null);
    }, 1000);
}

function handleSelect(ans) {
    clearInterval(timerId);
    const correct = questions[currentIdx].correct;
    const btns = document.querySelectorAll('.opt-btn');
    const currentDot = document.getElementById(`dot-${currentIdx}`);
    
    btns.forEach(b => b.disabled = true);

    if(ans === correct) {
        score++;
        document.getElementById(`btn-${ans}`).classList.add('correct');
        document.getElementById('sound-correct').play();
        currentDot.classList.add('is-correct');
    } else {
        if(ans) document.getElementById(`btn-${ans}`).classList.add('wrong');
        document.getElementById(`btn-${correct}`).classList.add('correct');
        document.getElementById('sound-wrong').play();
        currentDot.classList.add('is-wrong');
    }

    setTimeout(() => {
        currentIdx++;
        renderQuestion();
    }, 2000);
}

function endBatch() {
    saveToLocal();
    saveToFirebase(); // Firebase માં ઓનલાઇન સેવ કરવા માટે
    alert(`ક્વિઝ પૂર્ણ!\nનામ: ${studentData.name}\nસ્કોર: ${score}/${questions.length}`);
    location.reload();
}

function saveToLocal() {
    let recs = JSON.parse(localStorage.getItem('pansada_records') || "[]");
    recs.push({ ...studentData, score: score, total: questions.length, date: new Date().toLocaleString('gu-IN') });
    localStorage.setItem('pansada_records', JSON.stringify(recs));
}

// --- ૪. આ નવું ફંક્શન ડેટાબેઝમાં ડેટા મોકલશે ---
function saveToFirebase() {
    const data = {
        roll: studentData.roll,
        name: studentData.name,
        chapter: studentData.chapter,
        score: score,
        total: questions.length,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };
    db.ref('quiz_records').push(data);
}

function showAdmin() { 
    document.getElementById('admin-panel').style.display = 'flex'; 
    syncFromFirebase(); // ઓનલાઇન ડેટા ખેંચવા માટે
}

function syncFromFirebase() {
    db.ref('quiz_records').once('value', (snapshot) => {
        const fireData = snapshot.val();
        if(fireData) {
            let localRecs = [];
            Object.values(fireData).forEach(val => localRecs.push(val));
            localStorage.setItem('pansada_records', JSON.stringify(localRecs));
            updateRecordCount();
        }
    });
}

function updateRecordCount() {
    let recs = JSON.parse(localStorage.getItem('pansada_records') || "[]");
    document.getElementById('record-count').innerText = `કુલ ${recs.length} રેકોર્ડ સેવ છે.`;
}

function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

document.getElementById('adminPass').addEventListener('input', (e) => {
    if(e.target.value === "admin123") {
        document.getElementById('admin-actions').style.display = 'block';
        updateRecordCount();
    }
});

function downloadData() {
    let recs = JSON.parse(localStorage.getItem('pansada_records') || "[]");
    if(!recs.length) return alert("ડેટા નથી!");
    let csv = "\uFEFFરોલ,નામ,પાઠ,સ્કોર,તારીખ\n";
    recs.forEach(r => {
        let dateStr = r.date || new Date(r.timestamp).toLocaleString('gu-IN');
        csv += `${r.roll},${r.name},${r.chapter},${r.score}/${r.total},${dateStr}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "વિદ્યાર્થી_રિપોર્ટ.csv";
    link.click();
}

function clearData() { 
    if(confirm("બધો ડેટા સાફ કરવો છે? (Firebase માંથી પણ ડિલીટ થશે)")) { 
        localStorage.removeItem('pansada_records'); 
        db.ref('quiz_records').remove();
        location.reload(); 
    } 
}
